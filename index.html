<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Betting Raja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="br.png">


  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="header-bar">
  <h1 class="brand-title">Betting Raja</h1>
  <img src="br.png" alt="logo" class="brand-logo">
</div>


<div id="auth-section" class="auth-container">
  <div class="auth-card">
    <h3>Login / Sign Up</h3>

    <p class="auth-note">
      New to the site? First sign up, then sign in.
    </p>

    <input type="text" id="name" placeholder="Enter your name (for signup)">
    <input type="email" id="email" placeholder="Enter your email">
    <input type="password" id="password" placeholder="Enter your password">

    <div class="auth-buttons">
      <button onclick="signUp()">Sign Up</button>
      <button onclick="signIn()">Sign In</button>
    </div>
  </div>
</div>

<div id="dashboard">
  

  <div class="top-bar">
    
    
    <div class="logo">Predict the match. Rule the leaderboard.</div>
    <div class="user-info">
      <span id="welcome"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main-layout">

    <div class="left-panel">
      <h3>Upcoming Matches</h3>
      <div id="matches"></div>
    </div>

    <div class="center-panel">
      <h3>Leaderboard</h3>
      <div id="leaderboard"></div>
    </div>

    <div class="right-panel">
      <h3>Your Points</h3>
      <p id="points"></p>
    </div>

  </div>

</div>
<footer class="footer">
  © 2026 | Ghost Mind Creatives
</footer>




  <script>
    const { createClient } = supabase;

    const supabaseClient = createClient(
    "https://snmcwwpwfmzubcklljlk.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNubWN3d3B3Zm16dWJja2xsamxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODg0NTYsImV4cCI6MjA4NjU2NDQ1Nn0.hxLrOibSZv4f2tDGQTFom4bFfIksBkM0iMxrnXq4uPg"
    );

    window.onload = async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        showDashboard(data.session.user);
      }
    };

   async function signUp() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!name || !email || !password) {
    alert("Please fill all fields");
    return;
  }

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  // Insert user with name
  await supabaseClient.from("users").insert([{
    id: data.user.id,
    name: name,
    email: email,
    points: 0,
    wins: 0,
    losses: 0
  }]);

  alert("Signup successful! You can now sign in.");
}

  async function loadLeaderboard() {

  const { data } = await supabaseClient
    .from("users")
    .select("*")
    .order("points", { ascending: false });

  const container = document.getElementById("leaderboard");
  container.innerHTML = "";

  data.forEach((user, index) => {

    const div = document.createElement("div");

    // 🏆 Apply glow to top 3
    if (index === 0) {
      div.classList.add("rank-1");
    } else if (index === 1) {
      div.classList.add("rank-2");
    } else if (index === 2) {
      div.classList.add("rank-3");
    }

    div.innerHTML = `
      <p>
       ${index === 0 ? "👑 " : ""}#${index + 1} | ${user.name}
 |
        Points: ${user.points} |
        Wins: ${user.wins} |
        Losses: ${user.losses}
      </p>
    `;

    container.appendChild(div);
  });
}



   async function signIn() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  showDashboard(data.user);
}


    async function logout() {
      await supabaseClient.auth.signOut();
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("auth-section").style.display = "block";
    }

    async function createUserIfNotExists(user) {
      const { data } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", user.id)
        .single();

      if (!data) {
        await supabaseClient.from("users").insert([
          {
            id: user.id,
            name: user.email,
            email: user.email,
            points: 0,
            wins: 0,
            losses: 0
          }
        ]);
      }
    }

    async function showDashboard(user) {
      document.getElementById("auth-section").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      const { data } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", user.id)
        .single();

      document.getElementById("welcome").innerText =
        "Welcome, " + data.name;;

      document.getElementById("points").innerText =
        "Points: " + data.points;
        const pointsElement = document.getElementById("points");

if (data.points > 0) {
  pointsElement.style.color = "#22c55e";  // green
} else if (data.points < 0) {
  pointsElement.style.color = "#ef4444";  // red
} else {
  pointsElement.style.color = "#e6edf3";  // neutral
}


      loadMatches(user);
      loadLeaderboard();

    }
async function loadMatches(user) {

  const ADMIN_EMAIL = "vedantdahake346@gmail.com";

  const { data } = await supabaseClient
    .from("matches")
    .select("*")
    .eq("status", "upcoming");

  const container = document.getElementById("matches");
  container.innerHTML = "";
  if (!data || data.length === 0) {
  container.innerHTML = `
    <div class="empty-state">
      No upcoming matches.
    </div>
  `;
  return;
}


  for (let match of data) {

    const div = document.createElement("div");

    // 🔹 Check if user already predicted
    const { data: existing } = await supabaseClient
      .from("predictions")
      .select("*")
      .eq("user_id", user.id)
      .eq("match_id", match.id)
      .single();

    let predictionInfo = existing
      ? `<p>Your Prediction: <b>${existing.predicted_winner}</b></p>`
      : "";

    // 🔹 Lock prediction if match time passed
    const matchTimePassed =
      match.match_date && new Date(match.match_date) < new Date();

    let predictButtons = "";

    if (!existing && !matchTimePassed) {
      predictButtons = `
        <button onclick="predict('${match.id}', '${match.team_a}')">
          Predict ${match.team_a}
        </button>
        <button onclick="predict('${match.id}', '${match.team_b}')">
          Predict ${match.team_b}
        </button>
      `;
    }

    let adminButtons = "";

    if (user.email === ADMIN_EMAIL) {
      adminButtons = `
        <button onclick="settle('${match.id}', '${match.team_a}')">
          Set Winner: ${match.team_a}
        </button>
        <button onclick="settle('${match.id}', '${match.team_b}')">
          Set Winner: ${match.team_b}
        </button>
      `;
    }

    div.innerHTML = `
      <p>${match.team_a} vs ${match.team_b}</p>
      ${predictionInfo}
      ${predictButtons}
      ${adminButtons}
      <hr>
    `;

    container.appendChild(div);
  }
}


async function settle(matchId, winnerTeam) {

  const confirmSettle = confirm("Are you sure you want to settle this match?");
  if (!confirmSettle) return;

  const { error } = await supabaseClient.rpc("settle_match", {
    p_match_id: matchId,
    p_winner: winnerTeam
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Match settled successfully!");
    location.reload();
  }
}



async function predict(matchId, team) {
  const { data: sessionData } = await supabaseClient.auth.getSession();
  const user = sessionData.session.user;

  const { data: existing } = await supabaseClient
    .from("predictions")
    .select("*")
    .eq("user_id", user.id)
    .eq("match_id", matchId)
    .single();

  if (existing) {
    alert("You already predicted this match!");
    return;
  }
  const confirmPredict = confirm(`Are you sure you want to predict ${team}?`);
if (!confirmPredict) return;

  const { error } = await supabaseClient.from("predictions").insert([
    {
      user_id: user.id,
      match_id: matchId,
      predicted_winner: team
    }
  ]);

  if (error) {
    alert("Something went wrong");
  } else {
    alert("Prediction submitted!");
  }
}

  </script>
</body>
</html>
